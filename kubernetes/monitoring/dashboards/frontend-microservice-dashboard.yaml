apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-microservice-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  frontend-microservice-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false, "axisCenteredZero": false, "axisColorMode": "text",
                "axisLabel": "", "axisPlacement": "auto", "barAlignment": 0, "barWidthFactor": 0.6,
                "drawStyle": "line", "fillOpacity": 10, "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false, "lineInterpolation": "linear", "lineWidth": 1, "pointSize": 5,
                "scaleDistribution": { "type": "linear" }, "showPoints": "auto", "showValues": false,
                "spanNulls": false, "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "legend": { "calcs": [], "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "hideZeros": false, "mode": "single", "sort": "none" }
          },
          "pluginVersion": "12.3.1",
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"microservices\", pod=~\"frontend-microservice.*\", cpu=\"total\"}[5m])) by (pod) * 100",
              "legendFormat": "{{pod}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "frontend-microservice — CPU (%)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false, "axisCenteredZero": false, "axisColorMode": "text",
                "axisLabel": "", "axisPlacement": "auto", "barAlignment": 0, "barWidthFactor": 0.6,
                "drawStyle": "line", "fillOpacity": 10, "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false, "lineInterpolation": "linear", "lineWidth": 1, "pointSize": 5,
                "scaleDistribution": { "type": "linear" }, "showPoints": "auto", "showValues": false,
                "spanNulls": false, "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 80 }
                ]
              },
              "unit": "megabytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 0 },
          "id": 2,
          "options": {
            "legend": { "calcs": [], "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "hideZeros": false, "mode": "single", "sort": "none" }
          },
          "pluginVersion": "12.3.1",
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(container_memory_working_set_bytes{namespace=\"microservices\", pod=~\"frontend-microservice.*\"}) by (pod) / 1024 / 1024",
              "legendFormat": "{{pod}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "frontend-microservice — RAM (MB)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false, "axisCenteredZero": false, "axisColorMode": "text",
                "axisLabel": "", "axisPlacement": "auto", "barAlignment": 0, "barWidthFactor": 0.6,
                "drawStyle": "line", "fillOpacity": 10, "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "insertNulls": false, "lineInterpolation": "linear", "lineWidth": 1, "pointSize": 5,
                "scaleDistribution": { "type": "linear" }, "showPoints": "auto", "showValues": false,
                "spanNulls": false, "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 80 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 0 },
          "id": 3,
          "options": {
            "legend": { "calcs": [], "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "hideZeros": false, "mode": "single", "sort": "none" }
          },
          "pluginVersion": "12.3.1",
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(rate(nginx_http_requests_total{namespace=\"microservices\", app=\"frontend-microservice\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "frontend-microservice — Requetes Nginx (/s)",
          "type": "timeseries"
        },
        {
          "datasource": "Loki",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 7 },
          "id": 4,
          "options": {
            "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto", "wideLayout": true
          },
          "targets": [
            {
              "expr": "count_over_time({namespace=\"microservices\", pod=~\"frontend-microservice.*\"} |~ \"error|failed| 502 | 503 | 504 \" [5m])",
              "refId": "A"
            }
          ],
          "title": "frontend-microservice — Logs erreurs",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": 0 },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 7 },
          "id": 5,
          "options": {
            "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto", "wideLayout": true
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "nginx_up{namespace=\"microservices\", app=\"frontend-microservice\"}",
              "legendFormat": "{{pod}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "frontend-microservice — Alerte: Nginx down (health)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 80 }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 7 },
          "id": 6,
          "options": {
            "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto", "wideLayout": true
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "nginx_connections_reading{namespace=\"microservices\", app=\"frontend-microservice\"}",
              "legendFormat": "Reading",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "nginx_connections_writing{namespace=\"microservices\", app=\"frontend-microservice\"}",
              "legendFormat": "Writing",
              "range": true,
              "refId": "B"
            },
            {
              "editorMode": "code",
              "expr": "nginx_connections_waiting{namespace=\"microservices\", app=\"frontend-microservice\"}",
              "legendFormat": "Waiting",
              "range": true,
              "refId": "C"
            }
          ],
          "title": "frontend-microservice — Connexions actives (Reading/Writing/Waiting)",
          "type": "stat"
        }
      ],
      "preload": false,
      "refresh": "10s",
      "schemaVersion": 42,
      "tags": ["microservices", "frontend-microservice", "devsecops"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "frontend-microservice - Metrics & Logs",
      "uid": "frontend-microservice-dashboard",
      "version": 2
    }
